name: Build & Push Worker Image

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ghcr.io/corecomai/qwen-image-edit-worker:latest
            ghcr.io/corecomai/qwen-image-edit-worker:${{ github.sha }}
